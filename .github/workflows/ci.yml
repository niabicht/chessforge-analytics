name: CI

on:
  push:
    branches: ["**"] # Run on every branch push
  pull_request:
    branches: [main] # Always run on PRs targeting main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: src # Mirrors ENV PYTHONPATH=/app/src in the Dockerfile
        run: pytest tests/unit
