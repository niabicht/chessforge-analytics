services:
  database_service:
    image: postgres:18
    container_name: database_container
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      # Persist the database data in a Docker volume to ensure data is not lost when the container is stopped
      - database_data:/var/lib/postgresql

  app:
    build: .
    volumes:
      - ./data:/app/data
    depends_on:
      - database_service

volumes:
  database_data: